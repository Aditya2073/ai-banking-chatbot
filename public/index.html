<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI Based Banking Chatbot System - Secure digital banking with AI assistance">
    <title>AI Banking Chatbot - Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Background Particles -->
    <div class="bg-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <div class="logo-icon">🏦</div>
                <h1>AI Banking</h1>
                <p>Secure Digital Banking with AI Assistance</p>
            </div>

            <!-- Tab Switcher -->
            <div class="tab-switcher">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Alert Message -->
            <div class="alert" id="alertBox">
                <span id="alertText"></span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    🔐 Sign In
                </button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password" minlength="6" required>
                </div>
                <div class="form-group">
                    <label for="regRole">Account Type</label>
                    <select id="regRole">
                        <option value="customer">Customer</option>
                        <option value="staff">Bank Staff</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">
                    ✨ Create Account
                </button>
            </form>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
